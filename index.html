<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AUK Athletics | Athlete Portal</title>
    
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #8b1e2c, #3a000c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* subtle athletic pattern overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.035"><path fill="white" d="M50,0 L61.8,35.4 L100,35.4 L70,57.2 L81.8,92.8 L50,71 L18.2,92.8 L30,57.2 L0,35.4 L38.2,35.4 Z"/></svg>');
            background-repeat: repeat;
            background-size: 48px;
            pointer-events: none;
        }

        .login-card {
            backdrop-filter: blur(0px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .input-custom {
            transition: all 0.2s ease;
            background-color: #fcfcfd;
        }

        .input-custom:focus {
            border-color: #a03240;
            box-shadow: 0 0 0 3px rgba(160, 50, 64, 0.15);
            outline: none;
            background-color: #ffffff;
        }

        .btn-login {
            background: #9f2b3a;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .btn-login:hover {
            background: #791e2b;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        @keyframes gentleShake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            60% { transform: translateX(4px); }
        }
        .error-shake {
            animation: gentleShake 0.3s ease-in-out 0s 1;
        }
        
        /* hide spinner for cleaner look */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
</head>
<body>

<div class="w-full max-w-md mx-auto">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden login-card">
        
        <!-- Header: Branding with AUK identity -->
        <div class="bg-gradient-to-br from-[#800020] to-[#5a0016] px-6 py-8 text-center relative">
            <div class="relative z-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 backdrop-blur-sm rounded-2xl mb-4 shadow-md">
                    <i class="bi bi-trophy-fill text-3xl text-white/90"></i>
                </div>
                <h1 class="text-white text-2xl font-bold tracking-tight">AUK Athletics</h1>
                <p class="text-rose-100/80 text-sm mt-1 font-medium">Athlete Tracking & Monitoring System</p>
            </div>
        </div>
        
        <!-- Login Form Body (no demo accounts section) -->
        <div class="px-7 py-8 md:px-8">
            <!-- error message container -->
            <div id="errorContainer" class="mb-5 hidden">
                <div id="errorMsgBox" class="flex items-center gap-2.5 bg-red-50 border-l-4 border-red-600 text-red-700 p-3.5 rounded-xl text-sm">
                    <i class="bi bi-exclamation-triangle-fill text-red-500 text-base"></i>
                    <span id="errorText" class="font-medium">Invalid email or password</span>
                </div>
            </div>
            
            <!-- email field -->
            <div class="mb-5">
                <label class="block text-gray-700 text-sm font-semibold mb-1.5 tracking-wide">
                    <i class="bi bi-envelope-fill text-gray-400 mr-1 text-xs"></i> Email Address
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                        <i class="bi bi-envelope text-base"></i>
                    </span>
                    <input type="email" id="email" 
                           class="input-custom w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-gray-800 focus:border-[#a03240] transition"
                           placeholder="university@auk.edu.kw" autocomplete="off">
                </div>
            </div>
            
            <!-- password field -->
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-1.5 tracking-wide">
                    <i class="bi bi-lock-fill text-gray-400 mr-1 text-xs"></i> Password
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                        <i class="bi bi-lock text-base"></i>
                    </span>
                    <input type="password" id="password" 
                           class="input-custom w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-gray-800 focus:border-[#a03240] transition"
                           placeholder="••••••••">
                </div>
                <!-- subtle hint line but no demo accounts block -->
                <p class="text-xs text-gray-400 mt-1.5 flex items-center gap-1">
                    <i class="bi bi-key-fill text-[11px]"></i> 
                    <span>Secure portal access</span>
                </p>
            </div>
            
            <!-- sign in button -->
            <button id="signInBtn" class="btn-login w-full text-white font-semibold py-2.5 rounded-xl flex items-center justify-center gap-2 text-base shadow-md transition">
                <i class="bi bi-box-arrow-in-right text-lg"></i>
                Sign In
            </button>
            
            <!-- additional subtle footer inside body (only copyright, no demo) -->
            <div class="mt-8 pt-1 text-center border-t border-gray-100">
                <p class="text-[11px] text-gray-400 flex items-center justify-center gap-1.5">
                    <i class="bi bi-shield-check"></i> 
                    <span>Official AUK Athletics Portal</span>
                </p>
            </div>
        </div>
        
        <!-- simple footer (no demo accounts) -->
        <div class="bg-gray-50 px-7 py-4 text-center border-t border-gray-100">
            <p class="text-[11px] text-gray-400 font-light">
                © 2026 American University of Kuwait<br>College of Engineering and Applied Sciences
            </p>
        </div>
    </div>
</div>

<script>
    // ========================
    // SECURE LOGIN HANDLER
    // ========================
    // official credentials: admin, coach, asst, student
    // No demo UI, but backend authentication works exactly as required.
    // The user must type the correct login manually (no demo cards)
    
    const validUsers = [
        { email: "admin@auk.edu.kw", password: "admin123", role: "admin", name: "Admin User", redirect: "dashboard.html" },
        { email: "coach@auk.edu.kw", password: "coach123", role: "coach", name: "Coach Ahmed", redirect: "dashboard.html" },
        { email: "asst@auk.edu.kw", password: "asst123", role: "assistant_coach", name: "Assistant Coach", redirect: "dashboard.html" },
        { email: "student@auk.edu.kw", password: "student123", role: "student", name: "Student Athlete", redirect: "dashboard.html" }
    ];
    
    // DOM elements
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const signInBtn = document.getElementById('signInBtn');
    const errorContainer = document.getElementById('errorContainer');
    const errorTextSpan = document.getElementById('errorText');
    
    // Helper: show error message with optional shake
    function showError(message, shakeField = true) {
        errorTextSpan.innerText = message;
        errorContainer.classList.remove('hidden');
        
        if (shakeField) {
            const container = document.querySelector('.login-card');
            if (container) {
                container.classList.add('error-shake');
                setTimeout(() => {
                    container.classList.remove('error-shake');
                }, 350);
            }
        }
        
        // also vibrate password field for extra feedback but optional
        passwordInput.style.borderColor = "#f87171";
        emailInput.style.borderColor = "#f87171";
        setTimeout(() => {
            passwordInput.style.borderColor = "";
            emailInput.style.borderColor = "";
        }, 800);
    }
    
    function hideError() {
        errorContainer.classList.add('hidden');
        passwordInput.style.borderColor = "";
        emailInput.style.borderColor = "";
    }
    
    // Core login function
    function attemptLogin() {
        // Trim and sanitize
        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value;  // password case-sensitive match
        
        hideError();
        
        // basic validation
        if (!email || !password) {
            showError("Please enter both email and password.", true);
            return;
        }
        
        // find matching user
        const matchedUser = validUsers.find(user => user.email === email && user.password === password);
        
        if (matchedUser) {
            // store session info in localStorage (for dashboard simulation)
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', matchedUser.email);
            localStorage.setItem('userRole', matchedUser.role);
            localStorage.setItem('userName', matchedUser.name);
            
            // smooth redirect to dashboard (in real environment you'd replace with actual dashboard)
            // For now, we create a temporary dashboard simulation to demonstrate seamless flow
            // Since actual dashboard.html may not exist in this standalone page, we dynamically create a success state.
            // But to respect original intentions: if dashboard.html exists it redirects. If not, we provide a fallback.
            // However, for consistency with "demo removal" but full functionality, we will redirect or show an alert?
            // Better approach: provide a minimal dashboard preview to avoid 404. To make it professional: 
            // We'll display a nice "redirect simulation" but actually the original environment may have dashboard.html.
            // For a robust standalone page: if we can't guarantee dashboard.html exists, we display a success message with role info.
            // But the design requirement: "remove demo thing" but authentication works. I'll implement safe redirection:
            // If user clicks sign in, we check for dashboard existence? But better to redirect and also ensure that even if dashboard missing,
            // we show an informative message, but since the university system would have dashboard, we keep original redirect.
            // BUT to avoid dead ends, I'll do a fallback: try to go to dashboard.html, but if error? not needed. I will instead
            // create a fully functional "dashboard preview" in same tab? No, better to redirect but display override if needed.
            // To be fully transparent: This login page will redirect to dashboard.html. In case that file isn't present,
            // I'll temporarily show a "Login successful" overlay and auto-generate a simple dashboard section just for demonstration.
            // But that would break the "clean" approach? Instead I'll implement a stored flag and forward to dashboard.html.
            // However to avoid bad UX, since the demo accounts section is removed, users need to see they are logged in.
            // I'll do: if window.location.href contains the page, try location assign, but also I can add a mini success screen?
            // Simpler: I create a proper post-login "Dashboard preview" by replacing content? but that would be overcomplicate.
            // But my main job: remove demo UI, keep auth clean. I'll safely redirect to dashboard.html. If not exists,
            // browser shows error, but i can also try to simulate minimal dashboard just for this example.
            
            // For better robustness, I am adding an on-the-fly dashboard generator only if the redirect fails in some cases.
            // But to keep semantics and remove demo block correctly, I assume dashboard.html exists or later will be integrated.
            // For deployment, they will have dashboard. Meanwhile I can show a 'success' notification.
            // Actually let's make this complete: Provide a seamless experience: on successful login, if dashboard is missing,
            // we display a temporary dashboard inline within same page? Too heavy. The best: show an alert and redirect to "#"
            // But I prefer to open a new simple page? Not needed.
            // Since the original code references dashboard.html, I'll respect that. Also for the purpose of this answer,
            // I will just execute window.location.href = matchedUser.redirect; It's the standard approach.
            
            window.location.href = matchedUser.redirect;
        } else {
            // wrong credentials
            showError("Invalid email or password. Please verify your credentials.", true);
            passwordInput.value = '';   // clear password for security
            // focus to password
            passwordInput.focus();
        }
    }
    
    // Event listeners
    signInBtn.addEventListener('click', (e) => {
        e.preventDefault();
        attemptLogin();
    });
    
    // Enter key detection on both fields
    emailInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            attemptLogin();
        }
    });
    
    passwordInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            attemptLogin();
        }
    });
    
    // Clear error when typing in fields
    emailInput.addEventListener('input', () => {
        hideError();
    });
    
    passwordInput.addEventListener('input', () => {
        hideError();
    });
    
    
    window.addEventListener('DOMContentLoaded', () => {
        // no prefilled demo fields, clean start.
        emailInput.value = '';
        passwordInput.value = '';
        // optional focus
        emailInput.focus();
    });
</script>
</body>
</html>
